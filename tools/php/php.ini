; Минимальный php.ini для локального запуска проекта
extension_dir = "ext"
extension=pdo_sqlite
extension=sqlite3
extension=pdo_mysql
extension=pdo_pgsql
extension=pgsql
extension=mbstring
extension=openssl
extension=fileinfo
extension=zip
extension=com_dotnet
date.timezone = Europe/Moscow
display_errors = On
error_reporting = E_ALL
